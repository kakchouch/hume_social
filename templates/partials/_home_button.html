{% load static %}
<style>

        top: 16px;
        right: 16px;
        z-index: 1200;
        border: 1px solid #d8d3c4;
        border-radius: 999px;
        padding: 10px 14px;
        text-decoration: none;
        color: #1f2421;
        background: #fffdf7;
        box-shadow: 0 8px 20px rgba(31, 36, 33, 0.16);
